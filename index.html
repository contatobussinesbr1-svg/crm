<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
<h2>CRM</h2>

<button data-page="dashboard">Dashboard</button>
<button data-page="recrutamento">Recrutamento</button>
<button data-page="treinamento">Treinamento</button>
<button data-page="funcionarios">Funcionários</button>
<button data-page="documentos">Documentos</button>
<button data-page="financeiro">Financeiro</button>
<button data-page="setores">Setores</button>
</aside>

<!-- CONTENT -->
<main class="content">

<!-- DASH -->
<section id="dashboard" class="page">
<h1>Dashboard</h1>

<div class="cards">
<div class="card">Candidatos <span id="d1">0</span></div>
<div class="card">Funcionários <span id="d2">0</span></div>
<div class="card">Treinamento <span id="d3">0</span></div>
<div class="card">Documentos <span id="d4">0</span></div>
</div>
</section>

<!-- RECRUTAMENTO -->
<section id="recrutamento" class="page hidden">
<h1>Recrutamento</h1>

<input id="nome" placeholder="Nome">
<input id="cargo" placeholder="Cargo">
<input id="cidade" placeholder="Cidade">
<button onclick="addCand()">Adicionar</button>

<ul id="listaCand"></ul>
</section>

<!-- TREINAMENTO -->
<section id="treinamento" class="page hidden">
<h1>Treinamento</h1>
<ul id="listaTreino"></ul>
</section>

<!-- FUNCIONARIOS -->
<section id="funcionarios" class="page hidden">
<h1>Funcionários</h1>
<ul id="listaFunc"></ul>

<div id="ficha" class="ficha hidden"></div>
</section>

<!-- DOCUMENTOS -->
<section id="documentos" class="page hidden">
<h1>Documentos</h1>

<input type="file" id="file">
<ul id="listaDocs"></ul>
</section>

<!-- FINANCEIRO -->
<section id="financeiro" class="page hidden">
<h1>Financeiro</h1>

<input id="nomeSal" placeholder="Nome">
<input id="sal" placeholder="Salário">
<button onclick="addSal()">Adicionar</button>

<ul id="listaSal"></ul>
</section>

<!-- SETORES -->
<section id="setores" class="page hidden">
<h1>Setores</h1>

<input id="novoSetor" placeholder="Novo setor">
<button onclick="addSetor()">Adicionar</button>

<ul id="listaSetor"></ul>
</section>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</html>
