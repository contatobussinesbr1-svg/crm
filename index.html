<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* =========================
   SUPABASE CERTO
========================= */
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://vlywfccnhbrrolsuaqad.supabase.co",
  "sb_publishable_LzGdlhfjS1OCoW2LPbyRLg_RVHtLju3"
);

/* =========================
   NAV
========================= */
document.querySelectorAll(".nav-button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".section").forEach(s=>s.classList.add("hidden"));
    document.getElementById(btn.dataset.section).classList.remove("hidden");
  };
});

/* =========================
   LOGIN
========================= */
document.getElementById("login-form").onsubmit = e=>{
  e.preventDefault();
  document.getElementById("login").style.display="none";
  document.getElementById("app").classList.remove("hidden");
};

/* =========================
   DOCUMENTOS (FUNCIONANDO)
========================= */
const input = document.getElementById("docInput");
const lista = document.getElementById("listaDocs");

/* UPLOAD */
input.addEventListener("change", async ()=>{
  const file = input.files[0];
  if(!file) return;

  const nome = Date.now()+"_"+file.name;

  await supabaseClient.storage.from("docs").upload(nome, file);

  listarDocs();
});

/* LISTAR */
async function listarDocs(){
  lista.innerHTML = "";

  const { data } = await supabaseClient.storage.from("docs").list();

  if(!data) return;

  data.forEach(file=>{
    const url = `https://vlywfccnhbrrolsuaqad.supabase.co/storage/v1/object/public/docs/${file.name}`;

    lista.innerHTML += `
      <li>
        ${file.name}

        <button onclick="abrirDoc('${url}')">Abrir</button>
        <button onclick="abrirWord('${url}')">Word</button>
        <button onclick="imprimirDoc('${url}')">Imprimir</button>
        <button onclick="deletarDoc('${file.name}')">Excluir</button>
      </li>
    `;
  });
}

/* FUNÇÕES */
function abrirDoc(url){
  window.open(url, "_blank");
}

function abrirWord(url){
  window.open("https://view.officeapps.live.com/op/view.aspx?src="+url, "_blank");
}

function imprimirDoc(url){
  let win = window.open(url);
  win.onload = ()=> win.print();
}

async function deletarDoc(nome){
  await supabaseClient.storage.from("docs").remove([nome]);
  listarDocs();
}

/* LOAD */
listarDocs();

</script>
