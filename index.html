<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Empresarial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <section class="login-screen" id="login">
    <div class="login-panel">
      <div class="brand-chip">CRM Empresarial</div>
      <h1>Painel interno da empresa</h1>
      <p>Entre com um usuario cadastrado para acessar o CRM.</p>

      <form id="login-form" class="stack-form">
        <label for="user">Usuario</label>
        <input id="user" name="user" type="text" placeholder="Digite seu usuario" required>

        <label for="pass">Senha</label>
        <input id="pass" name="pass" type="password" placeholder="Digite sua senha" required>

        <button type="submit">Entrar</button>
      </form>
    </div>
  </section>

  <div class="app-shell hidden" id="app">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <p class="sidebar-kicker">Painel interno</p>
        <h2>CRM</h2>
      </div>

      <nav class="nav">
        <button class="nav-button active" data-section="dashboard">Dashboard</button>
        <button class="nav-button" data-section="recrutamento">Recrutamento</button>
        <button class="nav-button" data-section="treinamento">Treinamento</button>
        <button class="nav-button" data-section="funcionarios">Funcionarios</button>
        <button class="nav-button" data-section="departamentos">Departamentos</button>
        <button class="nav-button" data-section="financeiro">Financeiro</button>
        <button class="nav-button" data-section="documentos">Documentos</button>
        <button class="nav-button" data-section="relatorios">Relatorios</button>
        <button class="nav-button" data-section="config">Configuracoes</button>
      </nav>
    </aside>

    <main class="content">
      <!-- TODO SEU CONTEÚDO CONTINUA IGUAL -->
    </main>
  </div>

  <!-- SCRIPT PRINCIPAL -->
  <script type="module" src="script.js"></script>

  <!-- FIREBASE (AGORA CORRETO) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "SUA_CHAVE",
      authDomain: "SEU_DOMINIO",
      projectId: "SEU_PROJECT_ID",
    };

    const app = initializeApp(firebaseConfig);
    window.db = getFirestore(app);
  </script>

</body>
</html>
