<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM ONLINE</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  font-family:Arial;
  background:#f4f4f4;
  padding:20px;
}
.box{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}
button{
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="senha" type="password" placeholder="Senha"><br>
  <button onclick="login()">Entrar</button>
</div>

<div class="box">
  <h2>Cadastrar Candidato</h2>
  <input id="nome" placeholder="Nome"><br>
  <input id="cidade" placeholder="Cidade"><br>
  <input id="cargo" placeholder="Cargo"><br>
  <button onclick="addCandidato()">Salvar</button>
</div>

<div class="box">
  <h2>Lista de Candidatos</h2>
  <button onclick="listar()">Atualizar</button>
  <ul id="lista"></ul>
</div>

<script>

// 🔥 JÁ CONFIGURADO COM TEU SUPABASE
const SUPABASE_URL = "https://vlywfccnhbrrolsuaqad.supabase.co";
const SUPABASE_KEY = "sb_publishable_LzGdlhfjS1OCoW2LPbyRLg_RVHtLju3";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// LOGIN
async function login(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const {error} = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: senha
  });

  if(error){
    alert("Erro no login: " + error.message);
  }else{
    alert("Login feito com sucesso!");
  }
}

// INSERT
async function addCandidato(){
  const nome = document.getElementById("nome").value;
  const cidade = document.getElementById("cidade").value;
  const cargo = document.getElementById("cargo").value;

  const {error} = await supabaseClient
    .from("candidatos")
    .insert([{nome, cidade, cargo}]);

  if(error){
    alert("Erro ao salvar: " + error.message);
  }else{
    alert("Salvo com sucesso!");
    listar();
  }
}

// SELECT
async function listar(){
  const {data, error} = await supabaseClient
    .from("candidatos")
    .select("*");

  if(error){
    alert("Erro ao carregar: " + error.message);
    return;
  }

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(item=>{
    const li = document.createElement("li");
    li.innerText = item.nome + " - " + item.cargo + " (" + item.cidade + ")";
    lista.appendChild(li);
  });
}

</script>

</body>
</html>
