<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CRM Empresarial</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:Manrope; background:#f7f8fc; }

.sidebar{
width:220px;
height:100vh;
background:#c7d2fe;
position:fixed;
padding:20px;
}

.sidebar button{
display:block;
margin:10px 0;
background:none;
border:none;
cursor:pointer;
font-weight:600;
}

.content{
margin-left:240px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

button{
background:#a5b4fc;
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
color:white;
}

button:hover{
background:#818cf8;
}

li{
background:#eef2ff;
margin:10px 0;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<h3>CRM</h3>
<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('recrutamento')">Recrutamento</button>
<button onclick="mostrar('treinamento')">Treinamento</button>
<button onclick="mostrar('funcionarios')">Funcionários</button>
<button onclick="mostrar('departamentos')">Departamentos</button>
</div>

<div class="content">

<div id="dashboard" class="card">
<h2>Dashboard</h2>
<p>Total candidatos: <span id="dashCand">0</span></p>
<p>Total funcionários: <span id="dashFunc">0</span></p>
</div>

<div id="recrutamento" class="card" style="display:none">
<h2>Recrutamento</h2>

<input id="nomeCandidato" placeholder="Nome">
<input id="cidade" placeholder="Cidade">

<select id="cargo">
<option value="">Selecione o departamento</option>
<option>Administração</option>
<option>Retenção Pro</option>
<option>FTD</option>
<option>Financeiro</option>
<option>Recursos Humanos</option>
</select>

<button onclick="addCandidato()">Adicionar</button>

<ul id="listaCandidatos"></ul>
</div>

<div id="treinamento" class="card" style="display:none">
<h2>Treinamento</h2>
<ul id="treinoLista"></ul>
</div>

<div id="funcionarios" class="card" style="display:none">
<h2>Funcionários</h2>
<ul id="funcLista"></ul>
</div>

<div id="departamentos" class="card" style="display:none">
<h2>Departamentos</h2>

<ul id="deptLista"></ul>

<div id="detalheDept"></div>
</div>

</div>

<script>

// DADOS
let candidatos = [];
let treinamento = [];
let funcionarios = [];

let dept = [
"Administração",
"Retenção Pro",
"FTD",
"Financeiro",
"Recursos Humanos"
];

// NAVEGAÇÃO
function mostrar(sec){
document.querySelectorAll(".card").forEach(c=>c.style.display="none");
document.getElementById(sec).style.display="block";
}

// CANDIDATOS
function addCandidato(){
let c = {
nome:nomeCandidato.value,
cidade:cidade.value,
cargo:cargo.value
};

candidatos.push(c);
renderCand();
renderDept();
atualizar();
}

function renderCand(){
listaCandidatos.innerHTML="";
candidatos.forEach((c,i)=>{
listaCandidatos.innerHTML+=`
<li>${c.nome} - ${c.cargo}
<button onclick="aprovar(${i})">Aprovar</button>
</li>`;
});
}

// TREINAMENTO
function aprovar(i){
treinamento.push(candidatos[i]);
candidatos.splice(i,1);
renderAll();
}

function renderTreino(){
treinoLista.innerHTML="";
treinamento.forEach((t,i)=>{
treinoLista.innerHTML+=`
<li>${t.nome}
<button onclick="contratar(${i})">Contratar</button>
</li>`;
});
}

// FUNCIONÁRIOS
function contratar(i){
funcionarios.push(treinamento[i]);
treinamento.splice(i,1);
renderAll();
}

function renderFunc(){
funcLista.innerHTML="";
funcionarios.forEach(f=>{
funcLista.innerHTML+=`<li>${f.nome} - ${f.cargo}</li>`;
});
}

// DEPARTAMENTOS
function renderDept(){
deptLista.innerHTML="";

dept.forEach(d=>{

let total = candidatos.filter(c=>c.cargo===d).length +
funcionarios.filter(f=>f.cargo===d).length;

deptLista.innerHTML+=`
<li onclick="verDept('${d}')">
<b>${d}</b><br>
${total} pessoa(s)
</li>`;
});
}

function verDept(nome){

let pessoas = [
...candidatos.filter(c=>c.cargo===nome),
...funcionarios.filter(f=>f.cargo===nome)
];

let html = `<h3>${nome}</h3>`;

if(pessoas.length===0){
html+="<p>Ninguém aqui</p>";
}else{
pessoas.forEach(p=>{
html+=`<p>${p.nome}</p>`;
});
}

detalheDept.innerHTML = html;
}

// DASHBOARD
function atualizar(){
dashCand.innerText = candidatos.length;
dashFunc.innerText = funcionarios.length;
}

// RENDER GERAL
function renderAll(){
renderCand();
renderTreino();
renderFunc();
renderDept();
atualizar();
}

renderAll();

</script>

</body>
</html>
