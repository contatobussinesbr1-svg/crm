<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CRM Empresarial</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f6f8; }
.login { display:flex; height:100vh; justify-content:center; align-items:center; }
.login-box { background:white; padding:30px; border-radius:10px; width:300px; }
input, button { width:100%; padding:10px; margin:5px 0; }
button { background:#a5b4fc; border:none; cursor:pointer; border-radius:6px; }
.app { display:none; }
.sidebar { width:220px; height:100vh; background:#1e293b; color:white; position:fixed; padding:20px; }
.sidebar button { background:none; color:white; border:none; text-align:left; margin:5px 0; cursor:pointer; }
.content { margin-left:240px; padding:20px; }
.card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; }
</style>
</head>

<body>

<div class="login" id="login">
  <div class="login-box">
    <h2>Login</h2>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div class="app" id="app">

<div class="sidebar">
<h3>CRM</h3>
<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('recrutamento')">Recrutamento</button>
<button onclick="mostrar('funcionarios')">Funcionários</button>
<button onclick="logout()">Sair</button>
</div>

<div class="content">

<div id="dashboard" class="card">
<h2>Dashboard</h2>
<p>Total candidatos: <span id="dashCand">0</span></p>
<p>Total funcionários: <span id="dashFunc">0</span></p>
</div>

<div id="recrutamento" class="card" style="display:none">
<h2>Recrutamento</h2>
<input id="nomeCandidato" placeholder="Nome">
<input id="cidade" placeholder="Cidade">
<input id="cargo" placeholder="Cargo">
<button onclick="addCandidato()">Adicionar</button>
<ul id="listaCandidatos"></ul>
</div>

<div id="funcionarios" class="card" style="display:none">
<h2>Funcionários</h2>
<ul id="funcLista"></ul>
</div>

</div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://vlywfccnhbrrolsuaqad.supabase.co",
  "sb_publishable_LzGdlhfjS1OCoW2LPbyRLg_RVHtLju3"
);

/* LOGIN SIMPLES */
function login(){
  login.style.display="none";
  app.style.display="block";
  carregarDados();
}

function logout(){
  app.style.display="none";
  login.style.display="flex";
}

/* NAV */
function mostrar(sec){
document.querySelectorAll(".card").forEach(c=>c.style.display="none");
document.getElementById(sec).style.display="block";
}

/* DADOS */
let candidatos = [];
let funcionarios = [];

/* ADD */
async function addCandidato(){
  await supabase.from("candidatos").insert([
    {
      nome: nomeCandidato.value,
      cidade: cidade.value,
      cargo: cargo.value
    }
  ]);

  carregarDados();
}

/* CARREGAR */
async function carregarDados(){
  let { data } = await supabase.from("candidatos").select("*");
  candidatos = data || [];
  render();
}

/* RENDER */
function render(){
  listaCandidatos.innerHTML="";
  candidatos.forEach((c)=>{
    listaCandidatos.innerHTML+=`<li>${c.nome} - ${c.cargo}</li>`;
  });

  dashCand.innerText=candidatos.length;
}

</script>

</body>
</html>
