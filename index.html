<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CRM Profissional</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f6f8; }

/* LOGIN */
.login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}
.login-box {
  background:white;
  padding:30px;
  border-radius:10px;
  width:300px;
}
input, button {
  width:100%;
  padding:10px;
  margin:5px 0;
}
button {
  background:#6366f1;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* APP */
.app { display:none; }

/* SIDEBAR */
.sidebar {
  width:220px;
  height:100vh;
  background:#1e293b;
  color:white;
  position:fixed;
  padding:20px;
}
.sidebar button {
  background:none;
  color:white;
  border:none;
  text-align:left;
  margin:5px 0;
  cursor:pointer;
}

/* CONTENT */
.content {
  margin-left:240px;
  padding:20px;
}

/* CARD */
.card {
  background:white;
  padding:20px;
  border-radius:10px;
}

/* BOTÕES */
.btn { padding:6px 10px; margin:3px; border-radius:6px; border:none; cursor:pointer; }
.open { background:#60a5fa; }
.print { background:#34d399; }
.delete { background:#ef4444; color:white; }

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h2>Login</h2>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

<div class="sidebar">
<h3>CRM</h3>
<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('docs')">Documentos</button>
<button onclick="logout()">Sair</button>
</div>

<div class="content">

<!-- DASH -->
<div id="dashboard" class="card">
<h2>Dashboard</h2>
<p>Bem-vinda ao sistema 👋</p>
</div>

<!-- DOCUMENTOS -->
<div id="docs" class="card" style="display:none">
<h2>Documentos</h2>

<input type="file" id="fileInput">
<button onclick="upload()">Enviar Documento</button>

<ul id="listaDocs"></ul>
</div>

</div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://vlywfccnhbrrolsuaqad.supabase.co",
  "sb_publishable_LzGdlhfjS1OCoW2LPbyRLg_RVHtLju3"
);

/* LOGIN SIMPLES */
function entrar(){
  login.style.display="none";
  app.style.display="block";
  listar();
}

function logout(){
  app.style.display="none";
  login.style.display="flex";
}

/* MENU */
function mostrar(sec){
  document.querySelectorAll(".card").forEach(c=>c.style.display="none");
  document.getElementById(sec).style.display="block";
}

/* UPLOAD */
async function upload(){
  let file = fileInput.files[0];
  if(!file) return alert("Escolhe um arquivo");

  let { error } = await supabase.storage
    .from('docs')
    .upload(Date.now()+"_"+file.name, file);

  if(error){
    alert("Erro ao enviar");
  } else {
    listar();
  }
}

/* LISTAR */
async function listar(){
  let { data } = await supabase.storage.from('docs').list();

  listaDocs.innerHTML="";

  data.forEach(file=>{
    let url = `https://vlywfccnhbrrolsuaqad.supabase.co/storage/v1/object/public/docs/${file.name}`;

    listaDocs.innerHTML += `
    <li style="margin:10px 0;">
      ${file.name}<br>
      <button class="btn open" onclick="abrir('${url}')">Abrir</button>
      <button class="btn print" onclick="imprimir('${url}')">Imprimir</button>
      <button class="btn delete" onclick="deletar('${file.name}')">Excluir</button>
    </li>`;
  });
}

/* AÇÕES */
function abrir(url){
  window.open(url, '_blank');
}

function imprimir(url){
  let w = window.open(url);
  w.onload = () => w.print();
}

async function deletar(nome){
  await supabase.storage.from('docs').remove([nome]);
  listar();
}
</script>

</body>
</html>
