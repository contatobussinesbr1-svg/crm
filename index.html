<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CRM com Documentos</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family:Arial; background:#f4f6f8; margin:0; }

.sidebar {
  width:220px;
  height:100vh;
  background:#1e293b;
  color:white;
  position:fixed;
  padding:20px;
}

.content { margin-left:240px; padding:20px; }

.card {
  background:white;
  padding:20px;
  border-radius:10px;
}

button {
  padding:8px;
  margin:5px;
  cursor:pointer;
  border:none;
  border-radius:6px;
}

.btn-download { background:#60a5fa; }
.btn-delete { background:#ef4444; color:white; }
.btn-print { background:#34d399; }

</style>
</head>

<body>

<div class="sidebar">
<h3>CRM</h3>
<button onclick="mostrar('docs')">Documentos</button>
</div>

<div class="content">

<div id="docs" class="card">
<h2>Documentos</h2>

<input type="file" id="fileInput">
<button onclick="upload()">Enviar</button>

<ul id="listaDocs"></ul>

</div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://vlywfccnhbrrolsuaqad.supabase.co",
  "sb_publishable_LzGdlhfjS1OCoW2LPbyRLg_RVHtLju3"
);

function mostrar(sec){
document.querySelectorAll(".card").forEach(c=>c.style.display="none");
document.getElementById(sec).style.display="block";
}

/* UPLOAD */
async function upload(){
  let file = fileInput.files[0];
  if(!file) return alert("Escolhe um arquivo");

  let { data, error } = await supabase.storage
    .from('docs')
    .upload(file.name, file);

  if(error){
    alert("Erro ao enviar");
  } else {
    listar();
  }
}

/* LISTAR */
async function listar(){
  let { data } = await supabase.storage.from('docs').list();

  listaDocs.innerHTML="";

  data.forEach(file=>{
    let url = `https://vlywfccnhbrrolsuaqad.supabase.co/storage/v1/object/public/docs/${file.name}`;

    listaDocs.innerHTML += `
    <li>
      ${file.name}

      <button class="btn-download" onclick="abrir('${url}')">Abrir</button>
      <button class="btn-print" onclick="imprimir('${url}')">Imprimir</button>
      <button class="btn-delete" onclick="deletar('${file.name}')">Excluir</button>
    </li>`;
  });
}

/* ABRIR */
function abrir(url){
  window.open(url, '_blank');
}

/* IMPRIMIR */
function imprimir(url){
  let win = window.open(url);
  win.onload = () => win.print();
}

/* DELETE */
async function deletar(nome){
  await supabase.storage.from('docs').remove([nome]);
  listar();
}

listar();
</script>

</body>
</html>
